<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>🦁 ZooWorld</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦁</text></svg>">
<style>
  :root {
    --panel: rgba(18, 28, 20, .88); --line: #3e5a41; --text: #eaf5e6; --dim: #9fbf9a;
    --gold: #ffd166; --accent: #7ed957; --danger: #ff6b6b;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: #000; }
  body {
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; color: var(--text);
    user-select: none; -webkit-user-select: none; touch-action: none;
  }
  #game { position: fixed; inset: 0; }
  #game canvas { display: block; }

  #rotate {
    position: fixed; inset: 0; z-index: 100; background: #12241a;
    display: none; flex-direction: column; align-items: center; justify-content: center;
    gap: 14px; text-align: center; padding: 30px;
  }
  #rotate .ph { font-size: 64px; animation: rot 1.6s ease-in-out infinite; }
  @keyframes rot { 0%,20% { transform: rotate(0) } 60%,100% { transform: rotate(90deg) } }
  @media (orientation: portrait) { #rotate { display: flex; } }

  #loading {
    position: fixed; inset: 0; z-index: 90; background: #12241a;
    display: none; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
  }
  #loading .sp { font-size: 52px; animation: bounce 1s ease-in-out infinite; }
  @keyframes bounce { 50% { transform: translateY(-14px) } }

  .chip {
    background: var(--panel); border: 1.5px solid var(--line); border-radius: 12px;
    padding: 6px 12px; font-weight: 800; font-size: 14px; backdrop-filter: blur(4px);
  }
  #hud {
    position: fixed; top: calc(8px + env(safe-area-inset-top)); left: calc(10px + env(safe-area-inset-left));
    display: flex; gap: 8px; z-index: 10; align-items: center;
  }
  #hud-wanted { color: var(--danger); font-size: 12px; }
  #menu {
    position: fixed; top: calc(8px + env(safe-area-inset-top)); right: calc(10px + env(safe-area-inset-right));
    display: flex; gap: 8px; z-index: 35;
  }
  .iconbtn {
    background: var(--panel); border: 1.5px solid var(--line); color: var(--text);
    border-radius: 12px; font-size: 17px; padding: 6px 11px; cursor: pointer; backdrop-filter: blur(4px);
  }
  .iconbtn.active { border-color: var(--accent); }

  #banner {
    position: fixed; top: calc(48px + env(safe-area-inset-top)); left: 50%; transform: translateX(-50%);
    background: var(--panel); border: 2px solid var(--gold);
    padding: 8px 16px; border-radius: 12px; font-weight: 700; font-size: 13.5px;
    max-width: min(560px, 64vw); text-align: center; display: none; z-index: 20; pointer-events: none;
  }
  #ticker {
    position: fixed; bottom: calc(8px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
    background: var(--panel); border: 1.5px solid var(--line);
    padding: 5px 10px; border-radius: 10px; font-size: 12px; color: var(--dim);
    max-width: 52vw; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    z-index: 10; pointer-events: none;
  }
  #carrychip {
    position: fixed; top: calc(48px + env(safe-area-inset-top)); left: calc(10px + env(safe-area-inset-left));
    background: var(--panel); border: 1.5px solid var(--gold); border-radius: 10px;
    padding: 5px 10px; font-size: 12.5px; display: none; z-index: 10; pointer-events: none; max-width: 40vw;
  }
  #toast {
    position: fixed; bottom: calc(140px + env(safe-area-inset-bottom)); right: calc(24px + env(safe-area-inset-right));
    background: var(--panel); border: 1.5px solid var(--line); border-radius: 10px;
    padding: 7px 12px; font-size: 13px; font-weight: 700; display: none; z-index: 12; pointer-events: none;
    max-width: 40vw;
  }

  #actionbtn {
    position: fixed; right: calc(24px + env(safe-area-inset-right)); bottom: calc(26px + env(safe-area-inset-bottom));
    width: 96px; height: 96px; border-radius: 50%; border: 4px solid #fff3;
    background: radial-gradient(circle at 35% 30%, #ffe08a, var(--gold));
    color: #3a2b00; font-size: 13px; font-weight: 900; cursor: pointer;
    box-shadow: 0 6px 20px rgba(0,0,0,.5); display: none; z-index: 10; line-height: 1.15;
  }
  #actionbtn:active { transform: scale(.93); }
  #ab-emoji { font-size: 28px; display: block; }
  #dropbtn {
    position: fixed; right: calc(38px + env(safe-area-inset-right)); bottom: calc(30px + env(safe-area-inset-bottom));
    width: 70px; height: 70px; border-radius: 50%; border: 3px solid #fff3;
    background: var(--panel); color: var(--text); font-size: 12px; font-weight: 800;
    display: none; z-index: 10; cursor: pointer;
  }
  #sprintbtn {
    position: fixed; left: calc(24px + env(safe-area-inset-left)); bottom: calc(26px + env(safe-area-inset-bottom));
    width: 84px; height: 84px; border-radius: 50%; border: 4px solid #fff3;
    background: radial-gradient(circle at 35% 30%, #9fe08a, #57b34e);
    color: #12300f; font-size: 12px; font-weight: 900; cursor: pointer;
    box-shadow: 0 6px 20px rgba(0,0,0,.5); z-index: 10; line-height: 1.1;
  }
  #sprintbtn:active { transform: scale(.93); }
  #sprintbtn .big { font-size: 24px; display: block; }
  #stambar {
    position: fixed; left: calc(16px + env(safe-area-inset-left)); bottom: calc(118px + env(safe-area-inset-bottom));
    width: 100px; height: 10px; background: rgba(0,0,0,.4); border: 1.5px solid var(--line);
    border-radius: 6px; overflow: hidden; z-index: 10;
  }
  #stamfill { height: 100%; width: 100%; background: linear-gradient(90deg, #57b34e, #9fe08a); }

  #joy { position: fixed; width: 120px; height: 120px; border-radius: 50%;
    background: rgba(255,255,255,.08); border: 2px solid rgba(255,255,255,.25);
    display: none; z-index: 9; pointer-events: none; }
  #joy-knob { position: absolute; left: 50%; top: 50%; width: 52px; height: 52px;
    border-radius: 50%; background: rgba(255,255,255,.35); border: 2px solid rgba(255,255,255,.5);
    transform: translate(-50%,-50%); }

  #sidepanel {
    position: fixed; top: 0; right: 0; bottom: 0; width: min(380px, 48vw);
    background: rgba(14, 22, 16, .96); border-left: 2px solid var(--line); z-index: 30;
    transform: translateX(105%); transition: transform .22s ease; display: flex; flex-direction: column;
    padding-top: env(safe-area-inset-top); padding-right: env(safe-area-inset-right);
  }
  #sidepanel.open { transform: translateX(0); }
  #sp-head { display: flex; align-items: center; padding: 12px 14px; border-bottom: 1.5px solid var(--line); margin-top: 42px; }
  #sp-title { font-weight: 800; font-size: 15px; flex: 1; }
  #sp-close { background: none; border: none; color: var(--dim); font-size: 22px; cursor: pointer; padding: 2px 8px; }
  #sp-body { flex: 1; overflow-y: auto; padding: 12px; touch-action: pan-y; }
  .card {
    background: rgba(38, 58, 40, .8); border: 1.5px solid var(--line); border-radius: 14px;
    padding: 9px 11px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px;
  }
  .card .big { font-size: 26px; }
  .card .grow { flex: 1; min-width: 0; }
  .card .title { font-weight: 700; font-size: 13.5px; }
  .card .sub, .sub { color: var(--dim); font-size: 12px; margin-top: 2px; }
  .buy { background: var(--accent); color: #143016; border: none; border-radius: 10px;
    font-weight: 800; font-size: 12.5px; padding: 7px 10px; cursor: pointer; white-space: nowrap; }
  .buy:disabled { background: #2f4732; color: var(--dim); }
  .buy.alt { background: #2f4732; color: var(--text); border: 1.5px solid var(--line); }
  .buy.wide { width: 100%; padding: 12px; font-size: 14px; }
  .buy.danger { background: var(--danger); color: #330d0d; }
  .logrow { padding: 6px 2px; border-bottom: 1px solid var(--line); font-size: 12.5px; color: var(--dim); }
  .logrow b { color: var(--text); }
</style>
</head>
<body>
  <div id="game"></div>
  <div id="rotate"><div class="ph">📱</div><div style="font-size:18px;font-weight:800">Rotate your phone</div><div style="color:var(--dim)">ZooWorld is a landscape game 🌄</div></div>
  <div id="loading"><div class="sp">🦁</div><div id="loading-msg" style="font-weight:700">Loading...</div></div>

  <div id="hud">
    <span class="chip">🪙 <span id="hud-coins">0</span></span>
    <span class="chip">⭐ <span id="hud-level">1</span></span>
    <span class="chip">🏠 <span id="hud-pens">0/6</span></span>
    <span class="chip" id="hud-wanted"></span>
  </div>
  <div id="menu">
    <button class="iconbtn" data-panel="zoo">🏛️</button>
    <button class="iconbtn" data-panel="shop">🏪</button>
    <button class="iconbtn" data-panel="rivals">🏆</button>
    <button class="iconbtn" data-panel="log">📜</button>
    <button class="iconbtn" data-panel="mp">🌐</button>
    <button class="iconbtn" id="btn-sound">🔊</button>
    <button class="iconbtn" id="btn-pause">⏸</button>
  </div>
  <div id="banner"></div>
  <div id="carrychip"></div>
  <div id="ticker">Welcome to ZooWorld! Touch & drag to move 🕹️</div>
  <div id="toast"></div>
  <button id="actionbtn"><span id="ab-emoji">🐾</span><span id="ab-label">Do</span></button>
  <button id="dropbtn">🫳<br>Drop</button>
  <button id="sprintbtn"><span class="big">💨</span>SPRINT</button>
  <div id="stambar"><div id="stamfill"></div></div>
  <div id="joy"><div id="joy-knob"></div></div>

  <div id="sidepanel">
    <div id="sp-head"><div id="sp-title">Panel</div><button id="sp-close">✕</button></div>
    <div id="sp-body"></div>
  </div>

<script src="./lib/peerjs.min.js"></script>
<script type="module" src="./js/main.js"></script>
</body>
</html>
